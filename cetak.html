<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cetak & Simpan QR Absensi</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Segoe UI",Arial,sans-serif; background:#f1f5f9; }
  .toolbar { padding:10px 16px; background:#1e293b; color:#fff; display:flex; align-items:center; gap:8px; flex-wrap:wrap; position:sticky; top:0; z-index:99; border-bottom:1px solid #334155; }
  .toolbar-title { font-size:14px; font-weight:700; color:#f1f5f9; margin-right:4px; }
  .btn { border:none; padding:8px 16px; border-radius:7px; font-size:13px; cursor:pointer; font-weight:600; white-space:nowrap; }
  .btn-biru  { background:#3b82f6; color:#fff; }
  .btn-hijau { background:#22c55e; color:#fff; }
  .btn:hover { opacity:.85; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .filter-wrap { display:flex; align-items:center; gap:6px; }
  .filter-wrap label { font-size:12px; color:#94a3b8; white-space:nowrap; }
  select { background:#334155; color:#f1f5f9; border:1px solid #475569; border-radius:6px; padding:6px 10px; font-size:13px; cursor:pointer; }
  select:focus { outline:none; border-color:#3b82f6; }
  .progress { display:none; align-items:center; gap:8px; }
  .progress.show { display:flex; }
  .bar-wrap { width:120px; height:6px; background:#334155; border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; background:#22c55e; border-radius:3px; transition:width .15s; }
  .prog-text { font-size:12px; color:#94a3b8; white-space:nowrap; }
  .info { font-size:12px; color:#94a3b8; white-space:nowrap; }
  .loading { padding:60px 20px; text-align:center; color:#64748b; font-size:14px; line-height:2; }
  .kelas-section { padding:10px 16px 0; }
  .kelas-header { font-size:13px; font-weight:700; color:#1e40af; background:#dbeafe; padding:6px 14px; border-radius:8px; display:inline-block; margin-bottom:8px; }
  .grid { display:flex; flex-wrap:wrap; gap:12px; padding:0 16px 16px; }
  .kartu { width:8.5cm; height:5.5cm; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.12); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; gap:2px; page-break-inside:avoid; transition:outline .15s; }
  .kartu.done   { outline:2.5px solid #22c55e; }
  .kartu.proses { outline:2.5px solid #f59e0b; }
  .sekolah     { font-size:8pt;  font-weight:700; color:#1e40af; text-align:center; }
  .kelas-label { font-size:7pt;  color:#64748b; text-align:center; }
  .qr          { width:2.8cm; height:2.8cm; margin:4px 0; display:block; }
  .nama        { font-size:10pt; font-weight:700; color:#0f172a; text-align:center; max-width:7.8cm; line-height:1.3; }
  .nis         { font-size:8pt;  color:#64748b; }
  .footer      { font-size:7pt;  color:#94a3b8; margin-top:2px; }
  @media print {
    .toolbar { display:none !important; }
    .kelas-header { display:none !important; }
    body { background:#fff; }
    .grid { gap:6px; padding:6px; }
    .kartu { outline:none !important; box-shadow:none; }
    .kelas-section { padding:0; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">🎓 QR Absensi</span>
  <div class="filter-wrap">
    <label>Kelas:</label>
    <select id="sel-kelas" onchange="filterKelas()">
      <option value="SEMUA">— Semua Kelas —</option>
    </select>
  </div>
  <button class="btn btn-biru" id="btn-zip" onclick="simpanSemuaPNG()">📦 Simpan PNG (ZIP)</button>
  <button class="btn btn-hijau" onclick="window.print()">🖨️ Cetak</button>
  <span class="info" id="info-siswa">Memuat...</span>
  <div class="progress" id="progress">
    <div class="bar-wrap"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    <span class="prog-text" id="prog-text">0 / 0</span>
  </div>
</div>

<div id="konten"><div class="loading">⏳ Memuat data siswa...</div></div>

<script>
var SEMUA_SISWA  = [];
var KELAS_LIST   = [];
var NAMA_SEKOLAH = "";
var TAHUN_AJARAN = "";
var FILTER_AKTIF = "SEMUA";

var params    = new URLSearchParams(window.location.search);
var scriptUrl = params.get("url") || "";

if (!scriptUrl) {
  document.getElementById("konten").innerHTML =
    '<div class="loading">❌ Parameter <code>?url=</code> tidak ditemukan.<br>Buka halaman ini dari menu Apps Script.</div>';
} else {
  fetch(scriptUrl + "?mode=data")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      SEMUA_SISWA  = data.siswa       || [];
      KELAS_LIST   = data.daftarKelas || [];
      NAMA_SEKOLAH = data.namaSekolah || "Sekolah";
      TAHUN_AJARAN = data.tahunAjaran || "";

      var sel = document.getElementById("sel-kelas");
      KELAS_LIST.forEach(function(k) {
        var opt = document.createElement("option");
        opt.value = k; opt.textContent = "Kelas " + k;
        sel.appendChild(opt);
      });

      var kelasParam = params.get("kelas") || "SEMUA";
      if (kelasParam && kelasParam != "SEMUA" && KELAS_LIST.indexOf(kelasParam) > -1) {
        sel.value    = kelasParam;
        FILTER_AKTIF = kelasParam;
      }

      renderKartu(FILTER_AKTIF);
    })
    .catch(function(err) {
      document.getElementById("konten").innerHTML =
        '<div class="loading">❌ Gagal memuat data.<br><small>' + err.message + '</small><br><br>Pastikan Apps Script sudah di-deploy ulang.</div>';
    });
}

function filterKelas() {
  FILTER_AKTIF = document.getElementById("sel-kelas").value;
  renderKartu(FILTER_AKTIF);
}

function renderKartu(filter) {
  var siswaFilter = filter == "SEMUA"
    ? SEMUA_SISWA
    : SEMUA_SISWA.filter(function(s) { return s.kelas == filter; });

  document.getElementById("info-siswa").textContent =
    siswaFilter.length + " siswa" + (filter != "SEMUA" ? " · Kelas "+filter : " · Semua Kelas");
  document.getElementById("prog-text").textContent = "0 / " + siswaFilter.length;
  document.getElementById("bar").style.width = "0%";
  var btn = document.getElementById("btn-zip");
  btn.disabled = false; btn.textContent = "📦 Simpan PNG (ZIP)";
  document.getElementById("progress").classList.remove("show");

  var html = "";

  if (filter == "SEMUA") {
    KELAS_LIST.forEach(function(kls) {
      var sk = SEMUA_SISWA.filter(function(s) { return s.kelas == kls; });
      if (!sk.length) return;
      html += '<div class="kelas-section">';
      html += '<div class="kelas-header">📚 Kelas '+escHtml(kls)+' ('+sk.length+' siswa)</div>';
      html += '<div class="grid">';
      sk.forEach(function(s) { html += buatKartu(s); });
      html += '</div></div>';
    });
  } else {
    html += '<div class="kelas-section"><div class="grid">';
    siswaFilter.forEach(function(s) { html += buatKartu(s); });
    html += '</div></div>';
  }

  document.getElementById("konten").innerHTML = html;
}

function buatKartu(s) {
  return '<div class="kartu" data-nis="'+escHtml(s.nis)+'" data-kelas="'+escHtml(s.kelas)+'">' +
    '<div class="sekolah">'+escHtml(NAMA_SEKOLAH)+'</div>' +
    '<div class="kelas-label">Kelas '+escHtml(s.kelas)+' · '+escHtml(TAHUN_AJARAN)+'</div>' +
    '<img src="'+s.qrUrl+'" class="qr" crossorigin="anonymous" '+
         'onerror="this.src=\'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=error\'">' +
    '<div class="nama">'+escHtml(s.nama)+'</div>' +
    '<div class="nis">NIS: '+escHtml(s.nis)+'</div>' +
    '<div class="footer">Scan QR ini saat absensi</div>' +
  '</div>';
}

async function simpanSemuaPNG() {
  var siswaFilter = FILTER_AKTIF == "SEMUA"
    ? SEMUA_SISWA
    : SEMUA_SISWA.filter(function(s) { return s.kelas == FILTER_AKTIF; });

  if (!siswaFilter.length) { alert("Tidak ada siswa."); return; }

  var btn = document.getElementById("btn-zip");
  var progress = document.getElementById("progress");
  var bar = document.getElementById("bar");
  var progText = document.getElementById("prog-text");

  btn.disabled = true; btn.textContent = "⏳ Memproses...";
  progress.classList.add("show");

  // Tunggu semua gambar load
  await Promise.all(Array.from(document.querySelectorAll(".kartu img")).map(function(img) {
    return new Promise(function(resolve) {
      if (img.complete) { resolve(); return; }
      img.onload = img.onerror = resolve;
    });
  }));

  var namaZip = "QR_Absensi_" + (FILTER_AKTIF == "SEMUA" ? "SemuaKelas" : "Kelas_"+FILTER_AKTIF);
  var zip     = new JSZip();
  var total   = siswaFilter.length;
  var no      = 0;

  // Kelompokkan per kelas
  var grup = {};
  siswaFilter.forEach(function(s) {
    if (!grup[s.kelas]) grup[s.kelas] = [];
    grup[s.kelas].push(s);
  });

  for (var kls in grup) {
    var folder = zip.folder("Kelas_"+kls);
    var list   = grup[kls];
    for (var i = 0; i < list.length; i++) {
      var s     = list[i];
      var kartu = document.querySelector('.kartu[data-nis="'+s.nis+'"][data-kelas="'+s.kelas+'"]');
      if (!kartu) { no++; continue; }

      kartu.classList.add("proses");
      try {
        var cvs    = await html2canvas(kartu, { scale:3, useCORS:true, backgroundColor:"#ffffff", logging:false });
        var base64 = cvs.toDataURL("image/png").split(",")[1];
        var safe   = s.nama.replace(/[^a-zA-Z0-9\s]/g,"").replace(/\s+/g,"_");
        folder.file((i+1).toString().padStart(2,"0")+"_"+safe+"_NIS"+s.nis+".png", base64, {base64:true});
        kartu.classList.remove("proses");
        kartu.classList.add("done");
      } catch(e) {
        kartu.classList.remove("proses");
        console.warn("Gagal:", s.nama, e);
      }

      no++;
      bar.style.width      = Math.round(no/total*100)+"%";
      progText.textContent = no+" / "+total;
      if (no % 5 === 0) await new Promise(function(r){ setTimeout(r,30); });
    }
  }

  var blob = await zip.generateAsync({type:"blob", compression:"DEFLATE"});
  saveAs(blob, namaZip+".zip");

  btn.disabled    = false;
  btn.textContent = "✅ Selesai! Klik lagi untuk ulang";
  progText.textContent = "✓ "+total+" file tersimpan";
}

function escHtml(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
