<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cetak & Simpan QR Absensi</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Segoe UI",Arial,sans-serif; background:#f1f5f9; }

  /* TOOLBAR */
  .toolbar {
    padding:12px 16px; background:#1e293b; color:#fff;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    position:sticky; top:0; z-index:99;
  }
  .toolbar-title { font-size:14px; font-weight:600; margin-right:4px; }
  .btn {
    border:none; padding:9px 18px; border-radius:7px;
    font-size:13px; cursor:pointer; font-weight:600;
  }
  .btn-biru   { background:#3b82f6; color:#fff; }
  .btn-hijau  { background:#22c55e; color:#fff; }
  .btn-abu    { background:#475569; color:#fff; }
  .btn:hover  { opacity:.85; }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .info { font-size:12px; color:#94a3b8; }

  /* PROGRESS */
  .progress { display:none; align-items:center; gap:8px; }
  .progress.show { display:flex; }
  .bar-wrap  { width:120px; height:6px; background:#334155; border-radius:3px; overflow:hidden; }
  .bar-fill  { height:100%; background:#22c55e; border-radius:3px; transition:width .15s; }
  .prog-text { font-size:12px; color:#94a3b8; }

  /* LOADING STATE */
  .loading {
    padding:60px 20px; text-align:center;
    color:#64748b; font-size:14px; line-height:2;
  }

  /* GRID KARTU */
  .grid {
    display:flex; flex-wrap:wrap;
    gap:12px; padding:16px;
    justify-content:flex-start;
  }

  /* KARTU 8.5 x 5.5 cm */
  .kartu {
    width:8.5cm; height:5.5cm;
    background:#fff; border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:8px; gap:2px;
    page-break-inside:avoid;
    transition:outline .2s;
  }
  .kartu.done    { outline:2.5px solid #22c55e; }
  .kartu.loading { outline:2.5px solid #f59e0b; }

  .sekolah { font-size:8pt;  font-weight:700; color:#1e40af; text-align:center; }
  .kelas   { font-size:7pt;  color:#64748b;   text-align:center; }
  .qr      { width:2.8cm; height:2.8cm; margin:4px 0; display:block; }
  .nama    { font-size:10pt; font-weight:700; color:#0f172a; text-align:center; max-width:7.8cm; line-height:1.3; }
  .nis     { font-size:8pt;  color:#64748b; }
  .footer  { font-size:7pt;  color:#94a3b8; margin-top:2px; }

  @media print {
    .toolbar  { display:none !important; }
    body      { background:#fff; }
    .grid     { gap:6px; padding:6px; }
    .kartu    { outline:none !important; box-shadow:none; }
  }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-title">🎓 QR Absensi</span>
  <button class="btn btn-biru" id="btn-zip"   onclick="simpanSemuaPNG()">📦 Simpan Semua PNG (ZIP)</button>
  <button class="btn btn-hijau"               onclick="window.print()">🖨️ Cetak</button>
  <span class="info" id="info-siswa">Memuat data...</span>
  <div class="progress" id="progress">
    <div class="bar-wrap"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    <span class="prog-text" id="prog-text">0 / 0</span>
  </div>
</div>

<!-- KONTEN -->
<div id="konten"><div class="loading">⏳ Memuat data siswa dari spreadsheet...<br><small>Pastikan URL sudah benar di parameter <code>?url=</code></small></div></div>

<script>
// ============================================================
//  AMBIL DATA DARI APPS SCRIPT VIA URL PARAMETER
//  Cara pakai: cetak.html?url=URL_APPS_SCRIPT_KAMU
// ============================================================

var SISWA   = [];
var namaKelas   = "";
var namaSekolah = "";

// Ambil Apps Script URL dari parameter ?url=
var params     = new URLSearchParams(window.location.search);
var scriptUrl  = params.get("url") || "";

if (!scriptUrl) {
  document.getElementById("konten").innerHTML =
    '<div class="loading">❌ URL tidak ditemukan.<br>' +
    'Buka halaman ini dengan parameter:<br>' +
    '<code>cetak.html?url=https://script.google.com/...</code></div>';
} else {
  // Ambil data siswa dari Apps Script mode=data
  fetch(scriptUrl + "?mode=data")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      SISWA       = data.siswa      || [];
      namaKelas   = data.namaKelas  || "Kelas";
      namaSekolah = data.namaSekolah|| "Sekolah";
      renderKartu();
    })
    .catch(function(err) {
      document.getElementById("konten").innerHTML =
        '<div class="loading">❌ Gagal memuat data.<br>' +
        '<small>' + err.message + '</small><br><br>' +
        'Pastikan Apps Script sudah di-deploy ulang (New Version).</div>';
    });
}

// ============================================================
//  RENDER SEMUA KARTU
// ============================================================
function renderKartu() {
  document.getElementById("info-siswa").textContent = SISWA.length + " siswa";
  document.getElementById("prog-text").textContent  = "0 / " + SISWA.length;

  var html = '<div class="grid">';
  SISWA.forEach(function(s, i) {
    html +=
      '<div class="kartu" id="kartu-' + i + '">' +
        '<div class="sekolah">' + escHtml(namaSekolah) + '</div>' +
        '<div class="kelas">'   + escHtml(namaKelas)   + '</div>' +
        '<img src="' + s.qrUrl + '" class="qr" crossorigin="anonymous" ' +
             'onerror="this.src=\'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=error\'">' +
        '<div class="nama">'   + escHtml(s.nama) + '</div>' +
        '<div class="nis">NIS: ' + escHtml(s.nis) + '</div>' +
        '<div class="footer">Scan QR ini saat absensi</div>' +
      '</div>';
  });
  html += '</div>';
  document.getElementById("konten").innerHTML = html;
}

// ============================================================
//  SIMPAN SEMUA PNG KE ZIP
// ============================================================
async function simpanSemuaPNG() {
  if (SISWA.length === 0) { alert("Data siswa belum dimuat."); return; }

  var btn      = document.getElementById("btn-zip");
  var progress = document.getElementById("progress");
  var bar      = document.getElementById("bar");
  var progText = document.getElementById("prog-text");

  btn.disabled    = true;
  btn.textContent = "⏳ Memproses...";
  progress.classList.add("show");

  // Tunggu semua gambar QR selesai load dulu
  var semua = document.querySelectorAll(".kartu img");
  await Promise.all(Array.from(semua).map(function(img) {
    return new Promise(function(resolve) {
      if (img.complete) { resolve(); return; }
      img.onload = img.onerror = resolve;
    });
  }));

  var zip    = new JSZip();
  var folder = zip.folder("QR_Absensi_" + namaKelas.replace(/\s+/g, "_"));
  var total  = SISWA.length;

  for (var i = 0; i < total; i++) {
    var s     = SISWA[i];
    var kartu = document.getElementById("kartu-" + i);
    if (!kartu) continue;

    kartu.classList.add("loading");

    try {
      var cvs     = await html2canvas(kartu, { scale:3, useCORS:true, backgroundColor:"#ffffff", logging:false });
      var dataUrl = cvs.toDataURL("image/png");
      var base64  = dataUrl.split(",")[1];
      var safe    = s.nama.replace(/[^a-zA-Z0-9\s]/g, "").replace(/\s+/g, "_");
      var namaFile = (i + 1).toString().padStart(2, "0") + "_" + safe + "_NIS" + s.nis + ".png";
      folder.file(namaFile, base64, { base64: true });
      kartu.classList.remove("loading");
      kartu.classList.add("done");
    } catch(e) {
      kartu.classList.remove("loading");
      console.warn("Gagal render:", s.nama, e);
    }

    var persen = Math.round((i + 1) / total * 100);
    bar.style.width          = persen + "%";
    progText.textContent     = (i + 1) + " / " + total;

    // Kasih napas browser tiap 5 kartu
    if (i % 5 === 0) await new Promise(function(r) { setTimeout(r, 30); });
  }

  var blob = await zip.generateAsync({ type:"blob", compression:"DEFLATE" });
  saveAs(blob, "QR_Absensi_" + namaKelas.replace(/\s+/g, "_") + ".zip");

  btn.disabled    = false;
  btn.textContent = "✅ Selesai! Klik lagi untuk ulang";
  progText.textContent = "✓ " + total + " file tersimpan";
}

// ============================================================
//  HELPER
// ============================================================
function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>
</body>
</html>
