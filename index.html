<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner Absensi</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Segoe UI",Arial,sans-serif; background:#0f172a; color:#fff; min-height:100vh; }
  .header { background:#1e293b; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #334155; }
  .header .h1 { font-size:16px; font-weight:600; color:#f1f5f9; }
  .header .sub { font-size:12px; color:#94a3b8; margin-top:2px; }
  .scanner-wrap { position:relative; width:100%; max-width:480px; margin:0 auto; }
  #video { width:100%; display:block; background:#000; }
  .overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  .scan-box { position:absolute; top:50%; left:50%; transform:translate(-50%,-55%); width:220px; height:220px; }
  .scan-box::before, .scan-box::after { content:""; position:absolute; width:40px; height:40px; border-color:#22c55e; border-style:solid; }
  .scan-box::before { top:0; left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
  .scan-box::after  { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
  .corner-tr { position:absolute; top:0; right:0; width:40px; height:40px; border-top:3px solid #22c55e; border-right:3px solid #22c55e; border-radius:0 4px 0 0; }
  .corner-bl { position:absolute; bottom:0; left:0; width:40px; height:40px; border-bottom:3px solid #22c55e; border-left:3px solid #22c55e; border-radius:0 0 0 4px; }
  .scan-line { position:absolute; top:50%; left:50%; transform:translate(-50%,-55%); width:220px; height:2px; background:linear-gradient(90deg,transparent,#22c55e,transparent); animation:scanline 2s ease-in-out infinite; }
  @keyframes scanline { 0%,100%{margin-top:-110px;opacity:0} 10%,90%{opacity:1} 50%{margin-top:110px} }
  .hint { position:absolute; bottom:18%; left:0; right:0; text-align:center; font-size:13px; color:#94a3b8; }
  .status-bar { background:#1e293b; padding:12px 16px; text-align:center; min-height:52px; display:flex; align-items:center; justify-content:center; border-top:1px solid #334155; }
  .idle     { color:#64748b; font-size:14px; }
  .scanning { color:#22c55e; font-size:14px; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .counter { display:flex; gap:10px; max-width:480px; margin:10px auto; padding:0 14px; }
  .counter-item { flex:1; background:#1e293b; border-radius:10px; padding:10px; text-align:center; border:1px solid #334155; }
  .counter-item .angka { font-size:26px; font-weight:700; }
  .counter-item .label { font-size:11px; color:#64748b; margin-top:2px; }
  .c-hijau  { color:#22c55e; }
  .c-kuning { color:#f59e0b; }
  .c-merah  { color:#ef4444; }
  .log-wrap { max-width:480px; margin:0 auto; padding:0 14px 20px; }
  .log-header { font-size:13px; color:#64748b; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .log-list { list-style:none; max-height:260px; overflow-y:auto; }
  .log-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; margin-bottom:6px; font-size:14px; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .log-item.hadir    { background:#14532d; color:#bbf7d0; }
  .log-item.duplikat { background:#422006; color:#fde68a; }
  .log-item.gagal    { background:#450a0a; color:#fecaca; }
  .log-item .waktu   { font-size:11px; color:#6b7280; margin-left:auto; white-space:nowrap; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot-hadir    { background:#22c55e; }
  .dot-duplikat { background:#f59e0b; }
  .dot-gagal    { background:#ef4444; }
  .btn-clear { background:#1e293b; border:1px solid #334155; color:#94a3b8; padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; }
  .btn-clear:hover { background:#334155; }
  .no-cam { padding:60px 20px; text-align:center; color:#64748b; font-size:14px; line-height:1.8; }
  #canvas { display:none; }
  .info-bar { background:#172554; border:1px solid #1e3a8a; color:#93c5fd; font-size:12px; text-align:center; padding:8px; margin:8px 14px; border-radius:8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="h1">📷 Scanner Absensi — Mode Guru</div>
    <div class="sub">Arahkan kamera ke QR Code siswa</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:11px;color:#64748b" id="tgl"></div>
    <div style="font-size:11px;color:#94a3b8" id="jam"></div>
  </div>
</div>

<div class="info-bar">🔒 Mode resmi — hanya scan dari halaman ini yang diterima sistem</div>

<div class="scanner-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <div class="scan-box">
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
    </div>
    <div class="scan-line"></div>
    <div class="hint">Posisikan QR Code di dalam kotak</div>
  </div>
</div>

<div class="status-bar"><div class="idle" id="status-text">🎥 Memulai kamera...</div></div>

<div class="counter">
  <div class="counter-item"><div class="angka c-hijau" id="cnt-hadir">0</div><div class="label">Hadir</div></div>
  <div class="counter-item"><div class="angka c-kuning" id="cnt-duplikat">0</div><div class="label">Sudah Absen</div></div>
  <div class="counter-item"><div class="angka c-merah" id="cnt-gagal">0</div><div class="label">Gagal</div></div>
</div>

<div class="log-wrap">
  <div class="log-header">
    <span>📋 Riwayat Scan</span>
    <button class="btn-clear" onclick="bersihkanLog()">Hapus Riwayat</button>
  </div>
  <ul class="log-list" id="log-list">
    <li style="color:#4b5563;font-size:13px;text-align:center;padding:20px">Belum ada scan...</li>
  </ul>
</div>

<script>
  // ============================================================
  //  KONFIGURASI — ganti 2 baris ini
  // ============================================================
  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdP974-8uRf0x550hsa_3G7yobtxxFDwcv35k3qE8tUwip8mUBLMAf5ME6qr5wa59n/exec";
  var SCAN_TOKEN      = "MAYAK5C2025";

  // ============================================================
  //  VARIABEL STATE
  // ============================================================
  var video        = document.getElementById("video");
  var canvas       = document.getElementById("canvas");
  var ctx          = canvas.getContext("2d");
  var lastQR       = "";
  var lastQRTime   = 0;
  var sedangProses = false;   // lock: cegah kirim ganda saat request belum selesai
  var scanCache    = {};      // cache NIS yang sudah hadir hari ini (client-side)
  var cntHadir = 0, cntDuplikat = 0, cntGagal = 0;

  // ============================================================
  //  JAM REAL-TIME
  // ============================================================
  function updateJam() {
    var now = new Date();
    var opt = { timeZone:"Asia/Jakarta" };
    document.getElementById("tgl").textContent = now.toLocaleDateString("id-ID", Object.assign({weekday:"long",day:"numeric",month:"long",year:"numeric"}, opt));
    document.getElementById("jam").textContent = now.toLocaleTimeString("id-ID", opt);
  }
  setInterval(updateJam, 1000);
  updateJam();

  // Reset cache setiap pergantian hari (cek tiap menit)
  var hariIni = new Date().toLocaleDateString("id-ID");
  setInterval(function() {
    var hariSekarang = new Date().toLocaleDateString("id-ID");
    if (hariSekarang !== hariIni) {
      hariIni = hariSekarang;
      scanCache = {};
    }
  }, 60000);

  // ============================================================
  //  MULAI KAMERA
  // ============================================================
  navigator.mediaDevices.getUserMedia({ video: { facingMode:"environment" } })
  .then(function(stream) {
    video.srcObject = stream;
    video.play();
    setStatus("✅ Kamera aktif — arahkan ke QR Code siswa", "scanning");
    requestAnimationFrame(tick);
  })
  .catch(function(err) {
    document.querySelector(".scanner-wrap").innerHTML =
      '<div class="no-cam">❌ Kamera tidak dapat diakses.<br>Pastikan browser diberi izin kamera.<br><br><small>' + err.message + '</small></div>';
    setStatus("⚠️ Kamera tidak tersedia", "idle");
  });

  // ============================================================
  //  LOOP DETEKSI QR
  // ============================================================
  function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var qr = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts:"dontInvert" });
      if (qr && qr.data) {
        var now = Date.now();
        // Syarat proses: tidak sedang proses DAN (QR beda ATAU sudah 15 detik)
        if (!sedangProses && (qr.data !== lastQR || now - lastQRTime > 15000)) {
          lastQR     = qr.data;
          lastQRTime = now;
          prosesQR(qr.data);
        }
      }
    }
    requestAnimationFrame(tick);
  }

  // ============================================================
  //  PROSES HASIL SCAN
  // ============================================================
  function prosesQR(data) {
    sedangProses = true;
    try {
      var url  = new URL(data);
      var nis  = url.searchParams.get("nis")  || "";
      var nama = url.searchParams.get("nama") || "";

      if (nis == "" || nama == "") {
        tambahLog("gagal", "QR tidak dikenali", "—", "—");
        bunyiBeep(false);
        sedangProses = false;
        return;
      }

      var namaDecoded = decodeURIComponent(nama);

      // Cek cache lokal dulu — kalau sudah hadir hari ini, langsung tampilkan duplikat
      if (scanCache[nis]) {
        cntDuplikat++;
        document.getElementById("cnt-duplikat").textContent = cntDuplikat;
        tambahLog("duplikat", "⚠️ Sudah absen (" + scanCache[nis] + ")", namaDecoded, nis);
        setStatus("⚠️ " + namaDecoded + " sudah absen hari ini.", "idle");
        bunyiBeep(false);
        sedangProses = false;
        return;
      }

      setStatus("⏳ Mencatat " + namaDecoded + "...", "scanning");

      var kirimUrl = APPS_SCRIPT_URL
        + "?mode=api"
        + "&nis="   + encodeURIComponent(nis)
        + "&nama="  + encodeURIComponent(namaDecoded)
        + "&token=" + encodeURIComponent(SCAN_TOKEN)
        + "&ua=Scanner+Guru+GitHub";

      fetch(kirimUrl)
        .then(function(r) { return r.json(); })
        .then(function(hasil) {
          sedangProses = false;

          if (hasil.sukses) {
            // Simpan ke cache lokal supaya scan ulang langsung diblokir
            scanCache[nis] = hasil.waktu || "tadi";
            cntHadir++;
            document.getElementById("cnt-hadir").textContent = cntHadir;
            tambahLog("hadir", "✅ Hadir", namaDecoded, nis);
            setStatus("✅ " + namaDecoded + " — Hadir tercatat!", "idle");
            bunyiBeep(true);

          } else if (hasil.tipe == "duplikat") {
            // Simpan ke cache supaya scan berikutnya tidak perlu ke server
            scanCache[nis] = hasil.waktu || "tadi";
            cntDuplikat++;
            document.getElementById("cnt-duplikat").textContent = cntDuplikat;
            tambahLog("duplikat", "⚠️ Sudah absen pukul " + hasil.waktu, namaDecoded, nis);
            setStatus("⚠️ " + namaDecoded + " sudah absen.", "idle");
            bunyiBeep(false);

          } else {
            cntGagal++;
            document.getElementById("cnt-gagal").textContent = cntGagal;
            tambahLog("gagal", "❌ " + hasil.pesan, namaDecoded, nis);
            setStatus("❌ " + hasil.pesan, "idle");
            bunyiBeep(false);
          }
        })
        .catch(function(err) {
          sedangProses = false;
          tambahLog("gagal", "Error koneksi: " + err.message, namaDecoded, nis);
          setStatus("❌ Error koneksi — coba lagi", "idle");
          bunyiBeep(false);
        });

    } catch(e) {
      sedangProses = false;
      tambahLog("gagal", "Bukan QR absensi", "—", "—");
      bunyiBeep(false);
    }
  }

  // ============================================================
  //  HELPER UI
  // ============================================================
  function setStatus(teks, kelas) {
    var el = document.getElementById("status-text");
    el.textContent = teks;
    el.className   = kelas;
  }

  function tambahLog(tipe, keterangan, nama, nis) {
    var list = document.getElementById("log-list");
    if (list.children.length == 1 && list.children[0].style.textAlign == "center") list.innerHTML = "";
    var now = new Date().toLocaleTimeString("id-ID", { timeZone:"Asia/Jakarta" });
    var li  = document.createElement("li");
    li.className = "log-item " + tipe;
    li.innerHTML =
      '<div class="dot dot-' + tipe + '"></div>' +
      '<div>' +
        '<div style="font-weight:600">' + nama + '</div>' +
        '<div style="font-size:12px;opacity:.8">NIS: ' + nis + ' · ' + keterangan + '</div>' +
      '</div>' +
      '<div class="waktu">' + now + '</div>';
    list.insertBefore(li, list.firstChild);
    if (list.children.length > 50) list.removeChild(list.lastChild);
  }

  function bersihkanLog() {
    document.getElementById("log-list").innerHTML =
      '<li style="color:#4b5563;font-size:13px;text-align:center;padding:20px">Belum ada scan...</li>';
    cntHadir = 0; cntDuplikat = 0; cntGagal = 0;
    scanCache = {};
    document.getElementById("cnt-hadir").textContent    = 0;
    document.getElementById("cnt-duplikat").textContent = 0;
    document.getElementById("cnt-gagal").textContent    = 0;
  }

  function bunyiBeep(sukses) {
    try {
      var ac   = new (window.AudioContext || window.webkitAudioContext)();
      var osc  = ac.createOscillator();
      var gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.value = sukses ? 880 : 330;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.3, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }
</script>
</body>
</html>
